[workspace]
members = ["crates/bevy_nds", "crates/bevy_nds_3d", "crates/bevy_nds_3d_macros"]
resolver = "2"

[package]
name = "bevy-ds"
version = "0.1.0"
edition = "2024"

# The game binary. It is a *consumer* of the `bevy_nds` library: all DS-specific
# wiring (FFI, allocator, panic handler, screens, input, rendering, the frame
# loop) lives in that crate, so the game below is ordinary, portable Bevy code.

[dependencies]
bevy_nds = { path = "crates/bevy_nds" }
bevy_nds_3d = { path = "crates/bevy_nds_3d" }

bevy_app = { version = "0.16", default-features = false, features = [
  "critical-section",
] }
bevy_ecs = { version = "0.16", default-features = false, features = [
  "critical-section",
] }
bevy_input = { version = "0.16", default-features = false, features = [
  "critical-section",
  "libm",
] }
bevy_time = { version = "0.16", default-features = false, features = [
  "critical-section",
] }

[profile.dev]
panic = "abort"

# Bevy's recommended dev setup: keep our own crates unoptimized for fast
# rebuilds, but optimize all *dependencies* (notably bevy_ecs) so the debug ROM
# still runs at a usable frame rate on the 33 MHz ARM9.
[profile.dev.package."*"]
opt-level = 3

[profile.release]
panic = "abort"
opt-level = "s"
lto = true
codegen-units = 1
strip = true
